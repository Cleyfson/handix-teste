services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: handix_app
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    networks:
      - handix
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  nginx:
    image: nginx:1.25-alpine
    container_name: handix_nginx
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - handix
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: handix_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: handix
      MYSQL_USER: handix
      MYSQL_PASSWORD: handix
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - handix
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  handix:
    driver: bridge

volumes:
  db_data:
